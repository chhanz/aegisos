# Example bootc-image-builder build config.
#
# Mounted inside the container as /config.toml (via aegisctl disk --config).
# Put all customizations under [customizations].
# Reference: https://github.com/osbuild/bootc-image-builder (customizations examples in the README)
#
# Note: do not put secrets (API keys, etc.) in this file. Hermes config.yaml/.env are
# not baked into the image; they are created after boot with `hermes setup`.

# User to SSH in as on first boot. The password is only an example; prefer SSH keys only.
[[customizations.user]]
name = "hermes"
# The password below is an example. In production, drop password and use only the SSH public key (key).
password = "changeme"
key = "ssh-ed25519 AAAA...replace-with-your-public-key... you@example.com"
groups = ["wheel"]

# (Optional) Set the hostname.
# [customizations.hostname]
# hostname = "hummingbird-hermes"

# (Optional) Extra kernel arguments.
# [customizations.kernel]
# append = "mitigations=auto"
