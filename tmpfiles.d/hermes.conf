# Ensure the Hermes Agent data directory exists on first boot.
# The bootc guide recommends tmpfiles.d for pre-creating directories under /var.
#   - https://bootc.dev/bootc/filesystem.html
#
# Restrict to 0700 root since it holds secrets (config.yaml, .env, etc.).
# Type Path        Mode UID  GID  Age Argument
d /var/lib/hermes 0700 root root -
